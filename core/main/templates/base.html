<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1e3b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        nav {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        nav button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            background-color: #1e3a6b;
            color: #ffffff;
            transition: background 0.3s, transform 0.2s;
        }

        nav button:hover {
            background-color: #2e5299;
            transform: translateY(-2px);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #11254b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            min-width: 300px;
        }

        form input {
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
        }

        form button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            background-color: #1e3a6b;
            color: #ffffff;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        form button:hover {
            background-color: #2e5299;
        }

        p {
            text-align: center;
            font-size: 0.9rem;
        }

        p a {
            color: #71c7ff;
            text-decoration: none;
        }

        p a:hover {
            text-decoration: underline;
        }

        .messages {
            list-style: none;
            padding: 0;
            margin: 10px 0;
            width: 100%;
            max-width: 350px;
        }

        .alert {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .alert-success { background-color: #28a745; color: #fff; }
        .alert-error { background-color: #dc3545; color: #fff; }
        .alert-info { background-color: #17a2b8; color: #fff; }
    </style>
</head>
<body>
    <h1>{% block page_name %}{% endblock %}</h1>
    
    <nav>
        <a href="{% url 'index' %}"><button>User Home page</button></a>
        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}"><button>Logout {{ user.username }}</button></a>
        {% else %}
            <a href="{% url 'login' %}"><button>Login</button></a>
            <a href="{% url 'register' %}"><button>Register</button></a>
        {% endif %}
    </nav>

    {% if messages %}
    <div class="messages" id="message-container">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

<script>
    setTimeout(() => {
        const container = document.getElementById('message-container');
        if(container){
            container.style.transition = 'opacity 0.5s';
            container.style.opacity = '0';
            setTimeout(() => container.remove(), 500);
        }
    }, 3000); 
</script>

    <div>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
